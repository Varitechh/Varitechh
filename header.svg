<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00c8ff" stroke-width="0.4" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg-grad)"/>
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Corner accents -->
  <polyline points="0,20 0,0 20,0" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="880,0 900,0 900,20" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="0,260 0,280 20,280" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="880,280 900,280 900,260" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>

  <!-- Top neon line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#line-grad)" filter="url(#glow-soft)"/>

  <!-- Bottom neon line -->
  <rect x="0" y="278" width="900" height="2" fill="url(#line-grad)" filter="url(#glow-soft)"/>

  <!-- Sys tag -->
  <text x="36" y="38" font-family="monospace" font-size="11" fill="#00c8ff" fill-opacity="0.5" letter-spacing="3">// PROFILE.SYS — LOADING COMPLETE</text>

  <!-- Main name -->
  <text x="36" y="128" font-family="monospace" font-size="82" font-weight="900" fill="#ffffff" letter-spacing="18" filter="url(#glow-text)">EMIR</text>
  <!-- Neon duplicate for glow effect -->
  <text x="36" y="128" font-family="monospace" font-size="82" font-weight="900" fill="none" stroke="#00c8ff" stroke-width="0.5" letter-spacing="18" fill-opacity="0" filter="url(#glow-strong)">EMIR</text>

  <!-- Divider line -->
  <rect x="36" y="148" width="500" height="1" fill="url(#line-fade)" filter="url(#glow-soft)"/>
  <!-- Dot on divider -->
  <circle cx="36" cy="148" r="3" fill="#00c8ff" filter="url(#glow-strong)"/>

  <!-- Subtitle -->
  <text x="36" y="176" font-family="monospace" font-size="13" fill="#00c8ff" letter-spacing="3">GAME DEVELOPER  |  AI ENGINEER IN TRAINING  |  HARDWARE MAKER</text>

  <!-- Bottom tag -->
  <text x="36" y="220" font-family="monospace" font-size="11" fill="#00c8ff" fill-opacity="0.35" letter-spacing="2">UNITY  ·  PYTHON  ·  C#  ·  ARDUINO  ·  WINDOWS FORMS</text>

  <!-- Right side decorative lines -->
  <line x1="820" y1="40" x2="870" y2="40" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.4"/>
  <line x1="830" y1="50" x2="870" y2="50" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="845" y1="60" x2="870" y2="60" stroke="#00c8ff" stroke-width="1" stroke-opacity="0.1"/>

  <!-- Status indicator -->
  <circle cx="856" cy="240" r="4" fill="#00ff88" filter="url(#glow-soft)"/>
  <text x="868" y="244" font-family="monospace" font-size="10" fill="#00ff88" fill-opacity="0.7" letter-spacing="1">ONLINE</text>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="900" height="2" fill="#00c8ff" fill-opacity="0.3">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,280" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0;0.4;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
