<svg width="900" height="80" viewBox="0 0 900 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00c8ff" stroke-width="0.4" stroke-opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="900" height="80" fill="url(#bg-grad)"/>
  <rect width="900" height="80" fill="url(#grid)"/>
  <rect x="0" y="0" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>
  <polyline points="0,20 0,0 20,0" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="880,0 900,0 900,20" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <text x="36" y="44" font-family="monospace" font-size="11" fill="#00c8ff" fill-opacity="0.4" letter-spacing="3">// EOF</text>
  <text x="340" y="44" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.5" letter-spacing="2">Never stop building.</text>
  <text x="700" y="44" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.25" letter-spacing="2">VARITECHH © 2025</text>
</svg>
