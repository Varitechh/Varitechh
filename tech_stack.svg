<svg width="900" height="100" viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00c8ff" stroke-width="0.4" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="900" height="100" fill="url(#bg-grad)"/>
  <rect width="900" height="100" fill="url(#grid)"/>

  <rect x="0" y="0" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>
  <rect x="0" y="98" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>

  <polyline points="0,18 0,0 18,0" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,0 900,0 900,18" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="0,82 0,100 18,100" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,100 900,100 900,82" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>

  <text x="36" y="28" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.45" letter-spacing="4">// MODULE_02</text>

  <text x="36" y="66" font-family="monospace" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="10" filter="url(#glow-text)">TECH.STACK</text>
  <text x="36" y="66" font-family="monospace" font-size="30" font-weight="900" fill="none" stroke="#00c8ff" stroke-width="0.5" letter-spacing="10" filter="url(#glow-strong)">TECH.STACK</text>

  <rect x="36" y="78" width="400" height="1" fill="url(#line-fade)" filter="url(#glow-soft)"/>
  <circle cx="36" cy="78" r="3" fill="#00c8ff" filter="url(#glow-strong)"/>

  <rect x="0" y="0" width="900" height="2" fill="#00c8ff" fill-opacity="0.2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0;0.3;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
