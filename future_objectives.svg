<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00c8ff" stroke-width="0.4" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg-grad)"/>
  <rect width="900" height="260" fill="url(#grid)"/>

  <rect x="0" y="0" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>
  <rect x="0" y="258" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>

  <polyline points="0,18 0,0 18,0" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,0 900,0 900,18" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="0,242 0,260 18,260" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,260 900,260 900,242" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>

  <text x="36" y="30" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.45" letter-spacing="4">// MODULE_03</text>
  <text x="36" y="62" font-family="monospace" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="8" filter="url(#glow-text)">FUTURE.OBJECTIVES</text>
  <text x="36" y="62" font-family="monospace" font-size="28" font-weight="900" fill="none" stroke="#00c8ff" stroke-width="0.5" letter-spacing="8" filter="url(#glow-strong)">FUTURE.OBJECTIVES</text>

  <rect x="36" y="74" width="560" height="1" fill="url(#line-fade)" filter="url(#glow-soft)"/>
  <circle cx="36" cy="74" r="3" fill="#00c8ff" filter="url(#glow-strong)"/>

  <!-- Item 01 -->
  <rect x="36" y="92" width="3" height="48" fill="#00c8ff" fill-opacity="0.8" filter="url(#glow-soft)"/>
  <text x="52" y="108" font-family="monospace" font-size="13" font-weight="700" fill="#00c8ff" letter-spacing="3" filter="url(#glow-soft)">[ 01 ]  AI ENGINEERING</text>
  <text x="52" y="128" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.55" letter-spacing="1">Diving deep into machine learning and artificial intelligence.</text>
  <text x="52" y="144" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">Goal: build intelligent systems that solve real-world problems.</text>

  <!-- Item 02 -->
  <rect x="36" y="158" width="3" height="48" fill="#00c8ff" fill-opacity="0.5" filter="url(#glow-soft)"/>
  <text x="52" y="174" font-family="monospace" font-size="13" font-weight="700" fill="#00c8ff" fill-opacity="0.8" letter-spacing="3">[ 02 ]  ANDROID DEVELOPMENT</text>
  <text x="52" y="194" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.55" letter-spacing="1">Learning Android Studio to bring ideas to mobile.</text>
  <text x="52" y="210" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">Building apps that people carry in their pockets.</text>

  <!-- Item 03 -->
  <rect x="500" y="92" width="3" height="48" fill="#00c8ff" fill-opacity="0.5" filter="url(#glow-soft)"/>
  <text x="516" y="108" font-family="monospace" font-size="13" font-weight="700" fill="#00c8ff" fill-opacity="0.8" letter-spacing="3">[ 03 ]  GAME DEVELOPMENT</text>
  <text x="516" y="128" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.55" letter-spacing="1">Continuing Unity hobby projects.</text>
  <text x="516" y="144" font-family="monospace" font-size="11" fill="#ffffff" fill-opacity="0.35" letter-spacing="1">Games are my creative lab — always experimenting.</text>

  <!-- Bottom tag -->
  <text x="36" y="242" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.25" letter-spacing="2">TARGETS LOCKED IN — EXECUTING SEQUENCE</text>

  <rect x="0" y="0" width="900" height="2" fill="#00c8ff" fill-opacity="0.2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,260" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
