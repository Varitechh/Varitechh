<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-text">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020810"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c8ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00c8ff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00c8ff" stroke-width="0.4" stroke-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="900" height="260" fill="url(#bg-grad)"/>
  <rect width="900" height="260" fill="url(#grid)"/>

  <rect x="0" y="0" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>
  <rect x="0" y="258" width="900" height="1.5" fill="url(#line-grad)" filter="url(#glow-soft)"/>

  <polyline points="0,18 0,0 18,0" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,0 900,0 900,18" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="0,242 0,260 18,260" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="882,260 900,260 900,242" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>

  <text x="36" y="30" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.45" letter-spacing="4">// MODULE_04</text>
  <text x="36" y="62" font-family="monospace" font-size="28" font-weight="900" fill="#ffffff" letter-spacing="8" filter="url(#glow-text)">CORE.TRAITS</text>
  <text x="36" y="62" font-family="monospace" font-size="28" font-weight="900" fill="none" stroke="#00c8ff" stroke-width="0.5" letter-spacing="8" filter="url(#glow-strong)">CORE.TRAITS</text>

  <rect x="36" y="74" width="380" height="1" fill="url(#line-fade)" filter="url(#glow-soft)"/>
  <circle cx="36" cy="74" r="3" fill="#00c8ff" filter="url(#glow-strong)"/>

  <!-- Card 1: NEVER QUIT -->
  <rect x="36" y="92" width="190" height="72" fill="#00c8ff" fill-opacity="0.04" stroke="#00c8ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <polyline points="36,92 56,92" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="36,92 36,112" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <text x="48" y="110" font-family="monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="2" filter="url(#glow-soft)">NEVER QUIT</text>
  <text x="48" y="128" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">No matter how hard the</text>
  <text x="48" y="143" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">problem — debug until solved.</text>
  <text x="48" y="158" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">Persistence is the #1 skill.</text>

  <!-- Card 2: RELENTLESS DRIVE -->
  <rect x="246" y="92" width="190" height="72" fill="#00c8ff" fill-opacity="0.04" stroke="#00c8ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <polyline points="246,92 266,92" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="246,92 246,112" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <text x="258" y="110" font-family="monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="2" filter="url(#glow-soft)">RELENTLESS DRIVE</text>
  <text x="258" y="128" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">Always learning, always</text>
  <text x="258" y="143" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">building. Time = progress.</text>
  <text x="258" y="158" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">No idle moments allowed.</text>

  <!-- Card 3: GAME BUILDER -->
  <rect x="456" y="92" width="190" height="72" fill="#00c8ff" fill-opacity="0.04" stroke="#00c8ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <polyline points="456,92 476,92" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="456,92 456,112" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <text x="468" y="110" font-family="monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="2" filter="url(#glow-soft)">GAME BUILDER</text>
  <text x="468" y="128" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">Built Unity games as hobby.</text>
  <text x="468" y="143" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">Each project taught more</text>
  <text x="468" y="158" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">than any course ever could.</text>

  <!-- Card 4: AI CURIOUS -->
  <rect x="666" y="92" width="190" height="72" fill="#00c8ff" fill-opacity="0.04" stroke="#00c8ff" stroke-width="0.8" stroke-opacity="0.4"/>
  <polyline points="666,92 686,92" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <polyline points="666,92 666,112" fill="none" stroke="#00c8ff" stroke-width="2" filter="url(#glow-soft)"/>
  <text x="678" y="110" font-family="monospace" font-size="11" font-weight="700" fill="#00c8ff" letter-spacing="2" filter="url(#glow-soft)">AI CURIOUS</text>
  <text x="678" y="128" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">Fascinated by intelligent</text>
  <text x="678" y="143" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.5" letter-spacing="0.5">systems. The future belongs</text>
  <text x="678" y="158" font-family="monospace" font-size="9.5" fill="#ffffff" fill-opacity="0.35" letter-spacing="0.5">to those who BUILD AI.</text>

  <text x="36" y="242" font-family="monospace" font-size="10" fill="#00c8ff" fill-opacity="0.25" letter-spacing="2">PERSONALITY MATRIX — 4 ATTRIBUTES LOADED</text>

  <rect x="0" y="0" width="900" height="2" fill="#00c8ff" fill-opacity="0.2">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,260" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0;0.3;0" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
